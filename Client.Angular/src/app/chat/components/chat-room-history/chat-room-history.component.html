<div class="container-fluidd d-flex flex-column flex-fill text-nowrap p-2 overflow-y-auto card round">
    @for(msg of messages.value(); track msg.id) {
    <div class="d-flex flex-row flex-nowrap align-items-center gap-2">
        <small class="text-muted">[{{msg.timestamp | date:'yy/MM/dd HH:mm'}}]</small>
        <span>{{msg.text}}</span>
    </div>
    }
</div>
