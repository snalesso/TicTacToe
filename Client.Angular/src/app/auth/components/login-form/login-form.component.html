<form>

  <div class="d-flex flex-column gap-2">

    <div class="d-flex flex-row flex-fill gap-3">
      <label for="username"
             class="col col-form-label">Email</label>
      <div class="col-*">
        <input id="username"
               type="email"
               placeholder="Username"
               class="form-control"
               [formField]="_form.username" />
      </div>
    </div>

    <div class="d-flex flex-row flex-fill gap-3">
      <label for="password"
             class="col col-form-label">Password</label>
      <div class="col-*">
        <input id="password"
               type="password"
               placeholder="Password"
               class="form-control"
               [formField]="_form.password">
      </div>
    </div>

  </div>

</form>
